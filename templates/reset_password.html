{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto mt-10 p-6 bg-slate-900 border border-white/10 rounded-xl shadow-xl">
    <h2 class="text-2xl font-bold mb-6 text-white text-center">Reset Password</h2>
    
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="mb-4 p-3 bg-red-900/30 border border-red-500/50 text-red-200 text-sm rounded">
            {{ messages[0] }}
        </div>
      {% endif %}
    {% endwith %}

    <form method="POST" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-slate-400 mb-1">Username</label>
            <input type="text" name="username" required placeholder="Enter your username"
                class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2.5 text-white focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 outline-none">
        </div>
        
        <div>
            <label class="block text-sm font-medium text-slate-400 mb-1">New Password</label>
            <input type="password" name="new_password" required placeholder="Enter new password"
                class="w-full bg-slate-950 border border-slate-700 rounded-lg p-2.5 text-white focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 outline-none">
        </div>

        <button type="submit" 
            class="w-full bg-yellow-600 hover:bg-yellow-500 text-white font-bold py-2.5 rounded-lg transition duration-200">
            Update Password
        </button>
    </form>
    
    <p class="text-center text-slate-400 text-sm mt-4">
        Remembered password? <a href="/login" class="text-cyan-400 hover:underline">Back to Login</a>
    </p>
</div>
{% endblock %}
